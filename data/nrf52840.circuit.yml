meta:
  title: nRF52840 Feather default build
  target: nrf52840

components:
  U1:  { type: mcu/nrf52840,             label: nRF52840 }

  J1:  { type: connectors/usb_c,         label: Power }

  R_PWR:  { type: passives/resistor,     value: 220 }
  D_PWR:  { type: passives/led,          color: blue,  label: PWR }
  R_BT:   { type: passives/resistor,     value: 220 }
  D_BT:   { type: passives/led,          color: green, label: BLUETOOTH }
  R_SEL0: { type: passives/resistor,     value: 220 }
  D_SEL0: { type: passives/led,          color: red,   label: SEL_0 }
  R_SEL1: { type: passives/resistor,     value: 220 }
  D_SEL1: { type: passives/led,          color: red,   label: SEL_1 }
  R_SEL2: { type: passives/resistor,     value: 220 }
  D_SEL2: { type: passives/led,          color: red,   label: SEL_2 }

  SW_A:   { type: passives/pushbutton,   label: BTN_A }
  SW_B:   { type: passives/pushbutton,   label: BTN_B }
  SW_C:   { type: passives/pushbutton,   label: BTN_C }
  SW_D:   { type: passives/pushbutton,   label: BTN_D }
  SW_SEL: { type: passives/pushbutton,   label: BTN_SELECT }

connections:
  - net: VCC
    pins: [J1.VBUS, U1.VBUS]

  - net: GND
    pins: [J1.GND, U1.GNDL]

  # Status LEDs on the right-column GPIO bank.
  - net: LED_PWR
    path: [U1.D13, R_PWR.1, R_PWR.2, D_PWR.A, D_PWR.K, GND]
  - net: LED_BT
    path: [U1.D12, R_BT.1, R_BT.2, D_BT.A, D_BT.K, GND]
  - net: LED_SEL0
    path: [U1.D11, R_SEL0.1, R_SEL0.2, D_SEL0.A, D_SEL0.K, GND]
  - net: LED_SEL1
    path: [U1.D10, R_SEL1.1, R_SEL1.2, D_SEL1.A, D_SEL1.K, GND]
  - net: LED_SEL2
    path: [U1.D9,  R_SEL2.1, R_SEL2.2, D_SEL2.A, D_SEL2.K, GND]

  # Buttons on the left-column analog/GPIO header.
  - net: BTN_A
    path: [U1.A0, SW_A.1, SW_A.2, GND]
    pull: firmware
  - net: BTN_B
    path: [U1.A1, SW_B.1, SW_B.2, GND]
    pull: firmware
  - net: BTN_C
    path: [U1.A2, SW_C.1, SW_C.2, GND]
    pull: firmware
  - net: BTN_D
    path: [U1.A3, SW_D.1, SW_D.2, GND]
    pull: firmware
  - net: BTN_SELECT
    path: [U1.A4, SW_SEL.1, SW_SEL.2, GND]
    pull: firmware
