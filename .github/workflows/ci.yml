name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Lower bound of pyproject.toml `requires-python = ">=3.11"`.
          # Test only against this version for now; matrix-expand once a
          # newer-Python-only feature lands.
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Markdown lint
        # Mirror of scripts/pre-commit. Keep the glob and ignore-arg
        # in sync with that file's `markdownlint-cli2 …` invocation.
        shell: bash
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#.claude/security-review-latest.md"

      - name: Portability lint (.claude/skills/circuit/)
        # Unconditional per TASK-051 AC. No-op on empty / missing dir,
        # so safe to run before any skill code lands.
        shell: bash
        run: python scripts/portability_lint.py .claude/skills/circuit

      - name: Pytest
        run: pytest

      - name: .circuit.yml schema validation (TASK-052)
        # Re-validates every committed .circuit.yml in data/ and
        # tests/fixtures/ against circuit.schema.json. Catches the case
        # where the local pre-commit hook was bypassed with --no-verify
        # or run on a machine where hooks are not installed.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_circuit_schema.py --all

      - name: ERC report staleness + ERROR-level gate
        # Re-renders each shipped target's ERC report and diffs against the
        # committed copy; also fails on any ERROR-level ERC finding.
        # Scoped to ubuntu — matplotlib float-geometry stability is OS-
        # dependent (see test_renderer_staleness.py) and the report itself
        # is text-only, but we don't double-run on Windows.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_erc_reports.py

      - name: Exporter staleness gate (BOM + netlist)
        # Re-runs the BOM and netlist exporters for each shipped target
        # and diffs against the committed copies. Companion to the ERC
        # report gate above — same scoping rationale (text-only artefacts,
        # but no need to double-run on Windows).
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_exporters.py

      - name: Tutorial + gallery regression gate (TASK-101)
        # Re-renders every committed `.circuit.yml` under
        # docs/users/{tutorial,examples}/ and diffs the SVG / sidecars
        # against the committed artefacts. Skips circuits without a
        # committed SVG (the EPIC-012 gallery entries blocked on
        # IDEA-008 / IDEA-009).
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_gallery_regression.py

      - name: Catalog validation (offline)
        # Format + enforced_by + heuristic disclaimer + category-lint.
        # Online URL reachability runs nightly via the separate
        # catalog-nightly workflow (added when nightly cadence lands).
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          CS_CATALOG_OFFLINE: '1'
        run: python -m circuitsmith.knowledge.validate_catalog

      - name: Phase 2b trigger report
        # Aggregates `provenance.escalations` from every committed
        # meta.yml into a JSON build artifact the maintainer reviews at
        # release-prep time (TASK-058). The script always exits 0; the
        # gate logic lives in scripts/release_snapshot.py (TASK-059).
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_phase2b_trigger.py > phase2b-trigger.json

      - name: Upload Phase 2b trigger report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: phase2b-trigger
          path: phase2b-trigger.json
          if-no-files-found: error
