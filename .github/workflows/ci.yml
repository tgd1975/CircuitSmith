name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Lower bound of pyproject.toml `requires-python = ">=3.11"`.
          # Test only against this version for now; matrix-expand once a
          # newer-Python-only feature lands.
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Markdown lint
        # Mirror of scripts/pre-commit. Keep the glob and ignore-arg
        # in sync with that file's `markdownlint-cli2 …` invocation.
        shell: bash
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#.claude/security-review-latest.md"

      - name: Portability lint (.claude/skills/circuit/)
        # Unconditional per TASK-051 AC. No-op on empty / missing dir,
        # so safe to run before any skill code lands.
        shell: bash
        run: python scripts/portability_lint.py .claude/skills/circuit

      - name: Pytest
        run: pytest

      - name: Phase 2b trigger report
        # Aggregates `provenance.escalations` from every committed
        # meta.yml into a JSON build artifact the maintainer reviews at
        # release-prep time (TASK-058). The script always exits 0; the
        # gate logic lives in scripts/release_snapshot.py (TASK-059).
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: python scripts/check_phase2b_trigger.py > phase2b-trigger.json

      - name: Upload Phase 2b trigger report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: phase2b-trigger
          path: phase2b-trigger.json
          if-no-files-found: error
