<svg xmlns="http://www.w3.org/2000/svg" viewBox="-64 -64 256 256" width="256" height="256" data-skill="circuit-skill@0.4.0">
<title>Multi-page split — audio CE-amp chain</title>
<g class="wires" stroke="black" stroke-width="2" fill="none">
<path d="M 0,128 L 0,128 L 0,0" data-net="GND" data-from="J1.GND" data-to="U1.GNDL" />
<path d="M 0,0 L 0,0" data-net="GND" data-from="U1.GNDL" data-to="U1.GNDR" />
<path d="M 0,128 L 0,128 L 0,0" data-net="VCC" data-from="J1.VBUS" data-to="U1.VIN" />
</g>
<g class="components">
<g class="component" data-ref="J1" data-region="bottom-row"><rect x="-16" y="112" width="32" height="32" fill="white" stroke="black" stroke-width="2" /><text x="0" y="132" text-anchor="middle" font-family="DejaVu Sans" font-size="12">J1</text></g>
<g class="component" data-ref="J_IN" data-region="bottom-row"><rect x="48" y="112" width="32" height="32" fill="white" stroke="black" stroke-width="2" /><text x="64" y="132" text-anchor="middle" font-family="DejaVu Sans" font-size="12">J_IN</text></g>
<g class="component" data-ref="U1" data-region="mcu-center"><rect x="-16" y="-16" width="32" height="32" fill="white" stroke="black" stroke-width="2" /><text x="0" y="4" text-anchor="middle" font-family="DejaVu Sans" font-size="12">U1</text></g>
</g>
<g class="cross-page-labels" font-family="DejaVu Sans" font-size="11">
<g class="cross-page-label" data-net="GND" data-other-page="p2" data-direction="out"><line x1="80" y1="128" x2="96" y2="128" stroke="black" stroke-width="2" /><text x="100" y="132" text-anchor="start">GND ▶ p2</text></g>
</g>
</svg>
