meta:
  title: Tutorial step 2 — a second branch (fan-out)
  target: esp32

components:
  U1:    { type: mcu/esp32,            label: ESP32 }
  J1:    { type: connectors/usb_c,     label: Power }
  R1:    { type: passives/resistor,    value: 220 }
  D1:    { type: passives/led,         color: red,   label: STATUS_A }
  R2:    { type: passives/resistor,    value: 220 }
  D2:    { type: passives/led,         color: green, label: STATUS_B }

connections:
  - net: VCC
    pins: [J1.VBUS, U1.VIN]

  - net: GND
    pins: [J1.GND, U1.GNDL, U1.GNDR]

  - net: LED_STATUS_A
    path: [U1.D2, R1.1, R1.2, D1.A, D1.K, GND]

  - net: LED_STATUS_B
    path: [U1.D4, R2.1, R2.2, D2.A, D2.K, GND]
