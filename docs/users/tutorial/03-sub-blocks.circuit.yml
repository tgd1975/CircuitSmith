meta:
  title: Tutorial step 3 — repeated LED sub-blocks
  target: esp32

components:
  U1:    { type: mcu/esp32,            label: ESP32 }
  J1:    { type: connectors/usb_c,     label: Power }

  # Three copies of the same R+LED sub-block. The kernel recognises this
  # as a repeated canonical pattern and stacks all three copies in the
  # right-column region, each resistor attached-to its LED.
  R_PWR: { type: passives/resistor,    value: 220 }
  D_PWR: { type: passives/led,         color: blue,  label: PWR }
  R_BT:  { type: passives/resistor,    value: 220 }
  D_BT:  { type: passives/led,         color: green, label: BLUETOOTH }
  R_ERR: { type: passives/resistor,    value: 220 }
  D_ERR: { type: passives/led,         color: red,   label: ERROR }

connections:
  - net: VCC
    pins: [J1.VBUS, U1.VIN]

  - net: GND
    pins: [J1.GND, U1.GNDL, U1.GNDR]

  - net: LED_PWR
    path: [U1.D2, R_PWR.1, R_PWR.2, D_PWR.A, D_PWR.K, GND]

  - net: LED_BT
    path: [U1.D4, R_BT.1, R_BT.2, D_BT.A, D_BT.K, GND]

  - net: LED_ERR
    path: [U1.D5, R_ERR.1, R_ERR.2, D_ERR.A, D_ERR.K, GND]
