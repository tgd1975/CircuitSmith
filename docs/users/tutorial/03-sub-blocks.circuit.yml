meta:
  title: Tutorial step 3 — sub-block instances
  target: esp32

components:
  U1: { type: mcu/esp32,        label: ESP32 }
  J1: { type: connectors/usb_c, label: Power }

sub-blocks:
  led_indicator:
    components:
      R: { type: passives/resistor, value: 220 }
      D: { type: passives/led }
    ports:
      drive: R.1
      gnd:   D.K
    connections:
      - net: anode
        path: [R.2, D.A]

instances:
  PWR: { sub-block: led_indicator }
  BT:  { sub-block: led_indicator }
  ERR: { sub-block: led_indicator }

connections:
  - net: VCC
    pins: [J1.VBUS, U1.VIN]

  - net: GND
    pins: [J1.GND, U1.GNDL, U1.GNDR, PWR.gnd, BT.gnd, ERR.gnd]

  - net: LED_PWR
    pins: [U1.D2, PWR.drive]

  - net: LED_BT
    pins: [U1.D4, BT.drive]

  - net: LED_ERR
    pins: [U1.D5, ERR.drive]
