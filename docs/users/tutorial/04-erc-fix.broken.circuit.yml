meta:
  title: Tutorial step 4 — broken circuit (deliberately floating button input)
  target: esp32

components:
  U1:    { type: mcu/esp32,            label: ESP32 }
  J1:    { type: connectors/usb_c,     label: Power }
  SW1:   { type: passives/pushbutton,  label: BTN_USER }

connections:
  - net: VCC
    pins: [J1.VBUS, U1.VIN]

  - net: GND
    pins: [J1.GND, U1.GNDL, U1.GNDR]

  # Deliberately broken: button on a GPIO with no `pull: firmware`
  # and no hardware pull resistor. ERC E1 should flag this as a
  # floating input.
  - net: BTN_USER
    path: [U1.D13, SW1.1, SW1.2, GND]
